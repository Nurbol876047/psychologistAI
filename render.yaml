services:
  - type: web
    name: psychologistai
    env: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_THINKING_BUDGET
        value: 0
      - key: GEMINI_API_KEY
        sync: false
